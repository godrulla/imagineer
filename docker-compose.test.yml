version: '3.8'

services:
  # Test Database
  test-postgres:
    image: postgres:15-alpine
    restart: "no"
    environment:
      POSTGRES_DB: imagineer_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d imagineer_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      postgres -c log_statement=all
               -c log_destination=stderr
               -c log_min_messages=info
               -c max_connections=200

  # Test Redis Cache
  test-redis:
    image: redis:7-alpine
    restart: "no"
    ports:
      - "6380:6379"
    volumes:
      - test_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Test Message Queue (for background job testing)
  test-rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: "no"
    environment:
      RABBITMQ_DEFAULT_USER: test_user
      RABBITMQ_DEFAULT_PASS: test_password
      RABBITMQ_DEFAULT_VHOST: imagineer_test
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - test_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Test OpenAPI Mock Server
  test-mock-server:
    image: stoplight/prism:4
    restart: "no"
    ports:
      - "4010:4010"
    volumes:
      - ./infrastructure/api-contracts:/contracts
    command: >
      mock -h 0.0.0.0 -p 4010 --dynamic
      /contracts/design-parser-service.yaml
      /contracts/translation-engine-service.yaml
      /contracts/export-engine-service.yaml
      /contracts/collaboration-hub-service.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4010"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Test File Storage (MinIO for S3-compatible testing)
  test-minio:
    image: minio/minio:latest
    restart: "no"
    environment:
      MINIO_ROOT_USER: test_access_key
      MINIO_ROOT_PASSWORD: test_secret_key
    ports:
      - "9001:9000"
      - "9091:9090"
    volumes:
      - test_minio_data:/data
    command: server /data --console-address ":9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  test_postgres_data:
    driver: local
  test_redis_data:
    driver: local
  test_rabbitmq_data:
    driver: local
  test_minio_data:
    driver: local

networks:
  default:
    name: imagineer-test-network
    driver: bridge