apiVersion: v2
name: imagineer
description: A Helm chart for Imagineer Platform - Design-to-LLM Translation Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://imagineer.com
sources:
  - https://github.com/imagineer/platform
maintainers:
  - name: Armando Diaz Silverio
    email: armando@exxede.com
keywords:
  - design
  - llm
  - translation
  - ui
  - ux
  - microservices
annotations:
  category: Application Platform
dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 18.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: prometheus
    version: 25.x.x
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: 7.x.x
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled