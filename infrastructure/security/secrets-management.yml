# Imagineer Platform Secrets Management Configuration
# HashiCorp Vault, AWS Secrets Manager, and Kubernetes Secrets integration

apiVersion: v1
kind: ConfigMap
metadata:
  name: secrets-management-config
  namespace: imagineer-prod
data:
  # =============================================================================
  # VAULT CONFIGURATION
  # =============================================================================
  vault-config.hcl: |
    # Vault Configuration for Imagineer Platform
    storage "consul" {
      address = "consul:8500"
      path    = "vault/"
    }
    
    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_cert_file = "/vault/certs/vault.crt"
      tls_key_file  = "/vault/certs/vault.key"
    }
    
    seal "awskms" {
      region     = "us-east-1"
      kms_key_id = "alias/vault-seal-key"
    }
    
    api_addr = "https://vault.imagineer.com:8200"
    cluster_addr = "https://vault.imagineer.com:8201"
    
    ui = true
    
    # Telemetry
    telemetry {
      prometheus_retention_time = "30s"
      disable_hostname = true
    }

  # =============================================================================
  # VAULT POLICIES
  # =============================================================================
  vault-policies.hcl: |
    # Application policy for Imagineer services
    path "secret/data/imagineer/database/*" {
      capabilities = ["read"]
    }
    
    path "secret/data/imagineer/api-keys/*" {
      capabilities = ["read"]
    }
    
    path "secret/data/imagineer/jwt/*" {
      capabilities = ["read"]
    }
    
    path "secret/data/imagineer/ssl/*" {
      capabilities = ["read"]
    }
    
    # Admin policy for secret management
    path "secret/data/imagineer/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }
    
    path "auth/token/lookup-self" {
      capabilities = ["read"]
    }
    
    path "auth/token/renew-self" {
      capabilities = ["update"]
    }
    
    path "auth/token/revoke-self" {
      capabilities = ["update"]
    }

  # =============================================================================
  # SECRET ROTATION CONFIGURATION
  # =============================================================================
  rotation-config.yml: |
    secrets:
      # Database credentials - rotate every 90 days
      - name: "postgres-credentials"
        path: "secret/imagineer/database/postgres"
        rotation_period: "90d"
        rotation_strategy: "dual_write"
        validation:
          type: "database_connection"
          connection_string: "postgresql://{{ .username }}:{{ .password }}@postgres:5432/imagineer"
        
      # Redis credentials - rotate every 60 days  
      - name: "redis-credentials"
        path: "secret/imagineer/database/redis"
        rotation_period: "60d"
        rotation_strategy: "immediate"
        validation:
          type: "redis_connection"
          connection_string: "redis://:{{ .password }}@redis:6379"
      
      # JWT signing keys - rotate every 30 days
      - name: "jwt-signing-key"
        path: "secret/imagineer/jwt/signing-key"
        rotation_period: "30d"
        rotation_strategy: "overlapping"
        key_length: 64
        validation:
          type: "jwt_signature"
          test_payload: '{"sub": "test", "iat": 1234567890}'
      
      # API keys for external services - rotate every 180 days
      - name: "figma-api-key"
        path: "secret/imagineer/api-keys/figma"
        rotation_period: "180d"
        rotation_strategy: "manual"
        validation:
          type: "http_request"
          url: "https://api.figma.com/v1/me"
          headers:
            X-Figma-Token: "{{ .api_key }}"
          expected_status: 200
      
      - name: "openai-api-key"
        path: "secret/imagineer/api-keys/openai"
        rotation_period: "180d"
        rotation_strategy: "manual"
        validation:
          type: "http_request"
          url: "https://api.openai.com/v1/models"
          headers:
            Authorization: "Bearer {{ .api_key }}"
          expected_status: 200
      
      # SSL certificates - rotate 30 days before expiry
      - name: "ssl-certificates"
        path: "secret/imagineer/ssl/certificates"
        rotation_period: "auto"
        rotation_trigger: "certificate_expiry"
        advance_notice: "30d"
        validation:
          type: "certificate_validity"
          certificate_path: "{{ .certificate }}"
          key_path: "{{ .private_key }}"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: secrets-init-scripts
  namespace: imagineer-prod
data:
  # =============================================================================
  # VAULT INITIALIZATION SCRIPT
  # =============================================================================
  init-vault.sh: |
    #!/bin/bash
    set -euo pipefail
    
    # Wait for Vault to be ready
    until vault status >/dev/null 2>&1; do
      echo "Waiting for Vault to be ready..."
      sleep 5
    done
    
    # Initialize Vault if not already initialized
    if ! vault status | grep -q "Initialized.*true"; then
      echo "Initializing Vault..."
      vault operator init -key-shares=5 -key-threshold=3 > /tmp/vault-init.txt
      
      # Store unseal keys securely (in production, use external key management)
      UNSEAL_KEY_1=$(grep 'Unseal Key 1:' /tmp/vault-init.txt | awk '{print $4}')
      UNSEAL_KEY_2=$(grep 'Unseal Key 2:' /tmp/vault-init.txt | awk '{print $4}')
      UNSEAL_KEY_3=$(grep 'Unseal Key 3:' /tmp/vault-init.txt | awk '{print $4}')
      
      # Unseal Vault
      vault operator unseal "$UNSEAL_KEY_1"
      vault operator unseal "$UNSEAL_KEY_2"
      vault operator unseal "$UNSEAL_KEY_3"
      
      # Get root token
      ROOT_TOKEN=$(grep 'Initial Root Token:' /tmp/vault-init.txt | awk '{print $4}')
      echo "$ROOT_TOKEN" > /tmp/vault-root-token
      
      # Login with root token
      vault auth "$ROOT_TOKEN"
      
      # Enable secrets engine
      vault secrets enable -path=secret kv-v2
      
      # Create policies
      vault policy write imagineer-app /vault/config/vault-policies.hcl
      
      # Enable authentication methods
      vault auth enable kubernetes
      vault auth enable userpass
      
      # Configure Kubernetes auth
      vault write auth/kubernetes/config \
        token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
        kubernetes_host="https://$KUBERNETES_PORT_443_TCP_ADDR:443" \
        kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      
      # Create service account role
      vault write auth/kubernetes/role/imagineer-services \
        bound_service_account_names=imagineer-app \
        bound_service_account_namespaces=imagineer-prod \
        policies=imagineer-app \
        ttl=24h
    fi
    
    echo "Vault initialization completed"

  # =============================================================================
  # SECRETS POPULATION SCRIPT
  # =============================================================================
  populate-secrets.sh: |
    #!/bin/bash
    set -euo pipefail
    
    # Generate secure random passwords
    generate_password() {
      openssl rand -base64 32 | tr -d "=+/" | cut -c1-25
    }
    
    # Generate JWT secret
    generate_jwt_secret() {
      openssl rand -base64 64 | tr -d "=+/"
    }
    
    # Login to Vault
    vault auth -method=kubernetes role=imagineer-services
    
    # Database credentials
    POSTGRES_PASSWORD=$(generate_password)
    REDIS_PASSWORD=$(generate_password)
    
    vault kv put secret/imagineer/database/postgres \
      username=imagineer_user \
      password="$POSTGRES_PASSWORD" \
      host=postgres \
      port=5432 \
      database=imagineer
    
    vault kv put secret/imagineer/database/redis \
      password="$REDIS_PASSWORD" \
      host=redis \
      port=6379
    
    # JWT secrets
    JWT_SECRET=$(generate_jwt_secret)
    
    vault kv put secret/imagineer/jwt/signing-key \
      secret="$JWT_SECRET" \
      algorithm=HS256 \
      expiry=24h
    
    # Monitoring credentials
    GRAFANA_PASSWORD=$(generate_password)
    PROMETHEUS_PASSWORD=$(generate_password)
    
    vault kv put secret/imagineer/monitoring/grafana \
      admin_password="$GRAFANA_PASSWORD" \
      secret_key="$(generate_jwt_secret)"
    
    vault kv put secret/imagineer/monitoring/prometheus \
      admin_password="$PROMETHEUS_PASSWORD"
    
    # API keys (placeholder - replace with actual keys)
    vault kv put secret/imagineer/api-keys/figma \
      api_key="REPLACE_WITH_ACTUAL_FIGMA_KEY"
    
    vault kv put secret/imagineer/api-keys/openai \
      api_key="REPLACE_WITH_ACTUAL_OPENAI_KEY"
    
    vault kv put secret/imagineer/api-keys/anthropic \
      api_key="REPLACE_WITH_ACTUAL_ANTHROPIC_KEY"
    
    vault kv put secret/imagineer/api-keys/google \
      api_key="REPLACE_WITH_ACTUAL_GOOGLE_KEY"
    
    echo "Secrets populated successfully"

  # =============================================================================
  # SECRET ROTATION SCRIPT
  # =============================================================================
  rotate-secrets.sh: |
    #!/bin/bash
    set -euo pipefail
    
    ROTATION_LOG="/var/log/secret-rotation.log"
    
    log() {
      echo "$(date '+%Y-%m-%d %H:%M:%S') - $1" | tee -a "$ROTATION_LOG"
    }
    
    rotate_database_password() {
      local secret_path="$1"
      local service_name="$2"
      
      log "Starting password rotation for $service_name"
      
      # Get current credentials
      current_secret=$(vault kv get -format=json "$secret_path")
      current_password=$(echo "$current_secret" | jq -r '.data.data.password')
      username=$(echo "$current_secret" | jq -r '.data.data.username')
      
      # Generate new password
      new_password=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-25)
      
      # Update password in database
      if [[ "$service_name" == "postgres" ]]; then
        PGPASSWORD="$current_password" psql -h postgres -U "$username" -d imagineer \
          -c "ALTER USER $username PASSWORD '$new_password';"
      elif [[ "$service_name" == "redis" ]]; then
        redis-cli -h redis -a "$current_password" CONFIG SET requirepass "$new_password"
      fi
      
      # Update secret in Vault
      vault kv patch "$secret_path" password="$new_password"
      
      # Restart affected services (in Kubernetes)
      kubectl rollout restart deployment/design-parser -n imagineer-prod
      kubectl rollout restart deployment/translation-engine -n imagineer-prod
      kubectl rollout restart deployment/export-engine -n imagineer-prod
      kubectl rollout restart deployment/collaboration-hub -n imagineer-prod
      
      log "Password rotation completed for $service_name"
    }
    
    rotate_jwt_secret() {
      log "Starting JWT secret rotation"
      
      # Generate new JWT secret
      new_jwt_secret=$(openssl rand -base64 64 | tr -d "=+/")
      
      # Update in Vault with overlapping strategy (keep old key for 24h)
      vault kv patch secret/imagineer/jwt/signing-key \
        new_secret="$new_jwt_secret" \
        rotation_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      
      # Schedule old key removal
      echo "vault kv patch secret/imagineer/jwt/signing-key secret=\"$new_jwt_secret\"" | \
        at now + 24 hours
      
      log "JWT secret rotation completed"
    }
    
    check_certificate_expiry() {
      log "Checking SSL certificate expiry"
      
      cert_path="/etc/ssl/certs/imagineer.crt"
      if [[ -f "$cert_path" ]]; then
        expiry_date=$(openssl x509 -in "$cert_path" -noout -enddate | cut -d'=' -f2)
        expiry_epoch=$(date -d "$expiry_date" +%s)
        current_epoch=$(date +%s)
        days_until_expiry=$(( (expiry_epoch - current_epoch) / 86400 ))
        
        if [[ $days_until_expiry -lt 30 ]]; then
          log "SSL certificate expires in $days_until_expiry days - renewal required"
          # Trigger certificate renewal (Let's Encrypt or manual process)
          /usr/local/bin/renew-ssl-certificate.sh
        else
          log "SSL certificate valid for $days_until_expiry days"
        fi
      fi
    }
    
    # Main rotation logic
    case "${1:-all}" in
      "postgres")
        rotate_database_password "secret/imagineer/database/postgres" "postgres"
        ;;
      "redis")
        rotate_database_password "secret/imagineer/database/redis" "redis"
        ;;
      "jwt")
        rotate_jwt_secret
        ;;
      "ssl")
        check_certificate_expiry
        ;;
      "all")
        rotate_database_password "secret/imagineer/database/postgres" "postgres"
        sleep 60
        rotate_database_password "secret/imagineer/database/redis" "redis"
        sleep 60
        rotate_jwt_secret
        check_certificate_expiry
        ;;
      *)
        echo "Usage: $0 [postgres|redis|jwt|ssl|all]"
        exit 1
        ;;
    esac
    
    log "Secret rotation process completed"

---
apiVersion: v1
kind: Secret
metadata:
  name: vault-tls
  namespace: imagineer-prod
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key for Vault
  tls.crt: LS0tLS1CRUdJTi... # Your base64 encoded certificate
  tls.key: LS0tLS1CRUdJTi... # Your base64 encoded private key

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-rotation
  namespace: imagineer-prod
spec:
  schedule: "0 2 * * 0"  # Weekly on Sunday at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: secret-rotator
            image: vault:latest
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache postgresql-client redis
              /scripts/rotate-secrets.sh all
            volumeMounts:
            - name: rotation-scripts
              mountPath: /scripts
            - name: vault-config
              mountPath: /vault/config
            env:
            - name: VAULT_ADDR
              value: "https://vault.imagineer.com:8200"
            - name: VAULT_SKIP_VERIFY
              value: "false"
          volumes:
          - name: rotation-scripts
            configMap:
              name: secrets-init-scripts
              defaultMode: 0755
          - name: vault-config
            configMap:
              name: secrets-management-config
          restartPolicy: OnFailure