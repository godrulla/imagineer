# PostgreSQL Production Configuration for Imagineer Platform
# Optimized for performance, reliability, and monitoring

# =============================================================================
# CONNECTION AND AUTHENTICATION
# =============================================================================

# Connection Settings
max_connections = 200
superuser_reserved_connections = 3

# Authentication
ssl = on
ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL'
ssl_prefer_server_ciphers = on
ssl_ecdh_curve = 'prime256v1'

# Password encryption
password_encryption = scram-sha-256

# =============================================================================
# MEMORY SETTINGS
# =============================================================================

# Memory usage (adjust based on available RAM)
shared_buffers = 256MB                 # 25% of RAM
effective_cache_size = 1GB             # 75% of RAM
work_mem = 4MB                         # Per operation memory
maintenance_work_mem = 64MB            # Maintenance operations
max_wal_size = 4GB                     # WAL size limit
min_wal_size = 1GB                     # Minimum WAL size
wal_buffers = 16MB                     # WAL buffer size

# =============================================================================
# QUERY TUNING
# =============================================================================

# Cost-based optimizer settings
random_page_cost = 1.1                 # SSD-optimized
effective_io_concurrency = 200         # SSD concurrent I/O
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# Query planning
default_statistics_target = 100
constraint_exclusion = partition
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# =============================================================================
# WRITE AHEAD LOGGING (WAL)
# =============================================================================

# WAL settings for reliability and performance
wal_level = replica
fsync = on
synchronous_commit = on
wal_sync_method = fsync
full_page_writes = on
wal_compression = on
wal_log_hints = on

# Checkpoint settings
checkpoint_completion_target = 0.9
checkpoint_timeout = 5min
checkpoint_warning = 30s

# Archive settings (for backup)
archive_mode = on
archive_command = '/usr/local/bin/archive_wal.sh %f %p'
archive_timeout = 300

# =============================================================================
# REPLICATION (for future scaling)
# =============================================================================

# Hot standby settings
hot_standby = on
max_wal_senders = 10
max_replication_slots = 10
track_commit_timestamp = on

# =============================================================================
# LOGGING AND MONITORING
# =============================================================================

# Logging configuration
logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_truncate_on_rotation = on
log_rotation_age = 1d
log_rotation_size = 100MB

# What to log
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000     # Log queries > 1 second
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0
log_error_verbosity = default

# Statement logging
log_statement = 'ddl'                 # Log DDL statements
log_duration = on
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# =============================================================================
# PERFORMANCE MONITORING
# =============================================================================

# Statistics collection
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
stats_temp_directory = 'pg_stat_tmp'

# Statement statistics
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.save = on

# =============================================================================
# AUTOVACUUM
# =============================================================================

# Autovacuum settings for maintenance
autovacuum = on
autovacuum_max_workers = 6
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.1
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 400

# =============================================================================
# BACKGROUND WRITER
# =============================================================================

# Background writer for performance
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# =============================================================================
# SECURITY SETTINGS
# =============================================================================

# Security enhancements
ssl_min_protocol_version = 'TLSv1.2'
ssl_max_protocol_version = 'TLSv1.3'
row_security = on

# Connection security
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30
tcp_keepalives_count = 3

# =============================================================================
# LOCALE AND FORMATTING
# =============================================================================

# Locale settings
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# Default text search configuration
default_text_search_config = 'pg_catalog.english'

# =============================================================================
# EXTENSIONS AND CUSTOM SETTINGS
# =============================================================================

# Imagineer-specific settings
application_name = 'imagineer-platform'

# Custom parameters for application
imagineer.max_design_size = '100MB'
imagineer.translation_timeout = '120s'
imagineer.export_batch_size = '50'

# Extension settings
# TimescaleDB (if using time-series data)
# shared_preload_libraries = 'timescaledb,pg_stat_statements'

# PostGIS (if using geographical data)
# shared_preload_libraries = 'postgis-3,pg_stat_statements'