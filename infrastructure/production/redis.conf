# Redis Production Configuration for Imagineer Platform
# Optimized for caching, session storage, and real-time features

# =============================================================================
# NETWORK AND SECURITY
# =============================================================================

# Binding and ports
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# Security
requirepass ${REDIS_PASSWORD}
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG "CONFIG_b840fc02d524045429941cc15f59e41cb7be6c52"

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================

# Memory settings
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Memory usage optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000

# =============================================================================
# PERSISTENCE
# =============================================================================

# RDB persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# =============================================================================
# LOGGING
# =============================================================================

# Log level and file
loglevel notice
logfile ""
syslog-enabled no

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================

# Client settings
maxclients 10000

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Threading
io-threads 4
io-threads-do-reads yes

# =============================================================================
# SLOW LOG
# =============================================================================

# Slow log configuration
slowlog-log-slower-than 10000
slowlog-max-len 128

# =============================================================================
# LATENCY MONITORING
# =============================================================================

# Latency tracking
latency-monitor-threshold 100

# =============================================================================
# EVENT NOTIFICATION
# =============================================================================

# Keyspace notifications for real-time features
notify-keyspace-events "Ex"

# =============================================================================
# ADVANCED CONFIG
# =============================================================================

# Protocol and data size limits
tcp-keepalive 300
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Hash table rehashing
activerehashing yes

# Jemalloc background thread
jemalloc-bg-thread yes

# =============================================================================
# REPLICATION (for future scaling)
# =============================================================================

# Replication settings (master configuration)
# replica-serve-stale-data yes
# replica-read-only yes
# repl-diskless-sync no
# repl-diskless-sync-delay 5
# repl-ping-replica-period 10
# repl-timeout 60

# =============================================================================
# MODULES AND EXTENSIONS
# =============================================================================

# Load modules (if needed)
# loadmodule /usr/lib/redis/modules/redisearch.so
# loadmodule /usr/lib/redis/modules/redisjson.so
# loadmodule /usr/lib/redis/modules/redistimeseries.so

# =============================================================================
# CLUSTER (for future scaling)
# =============================================================================

# Cluster configuration (disabled for single instance)
# cluster-enabled yes
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000
# cluster-require-full-coverage yes

# =============================================================================
# IMAGINEER-SPECIFIC SETTINGS
# =============================================================================

# Custom configuration for Imagineer platform features
# Session timeout for web sessions
# Default: 24 hours (86400 seconds)

# Cache TTL for different data types
# Design cache: 1 hour (3600 seconds)
# Translation cache: 30 minutes (1800 seconds)
# Export cache: 10 minutes (600 seconds)
# User session cache: 24 hours (86400 seconds)

