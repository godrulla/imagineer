# Nginx Security Headers Configuration
# Comprehensive security headers for production deployment

# Content Security Policy (CSP)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self'; object-src 'none'; child-src 'self'; frame-src 'self'; worker-src 'self' blob:; manifest-src 'self'; connect-src 'self' wss: https:; form-action 'self'; base-uri 'self'; upgrade-insecure-requests;" always;

# HTTP Strict Transport Security (HSTS)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# X-Frame-Options - Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# X-Content-Type-Options - Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# X-XSS-Protection - Enable XSS filtering
add_header X-XSS-Protection "1; mode=block" always;

# Referrer Policy - Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy - Control browser features
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), cross-origin-isolated=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" always;

# Cross-Origin Embedder Policy
add_header Cross-Origin-Embedder-Policy "require-corp" always;

# Cross-Origin Opener Policy
add_header Cross-Origin-Opener-Policy "same-origin" always;

# Cross-Origin Resource Policy
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Clear-Site-Data - Clear browser data on logout (conditional)
# add_header Clear-Site-Data '"cache", "cookies", "storage", "executionContexts"' always;

# Expect-CT - Certificate Transparency
add_header Expect-CT "max-age=86400, enforce" always;

# X-Permitted-Cross-Domain-Policies - Adobe Flash security
add_header X-Permitted-Cross-Domain-Policies "none" always;

# X-DNS-Prefetch-Control - DNS prefetching control
add_header X-DNS-Prefetch-Control "off" always;

# Custom security headers for Imagineer Platform
add_header X-Imagineer-Version "1.0.0" always;
add_header X-Security-Contact "security@imagineer.com" always;

# Server information hiding (already configured in main nginx.conf)
# server_tokens off;

# Cache control for security-sensitive content
add_header Cache-Control "no-cache, no-store, must-revalidate" always;
add_header Pragma "no-cache" always;
add_header Expires "0" always;