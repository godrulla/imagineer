tags:
  - name: Health
    description: Service health and status endpoints
  - name: Templates
    description: Translation template management
  - name: Translation Jobs
    description: Asynchronous translation job management
  - name: Direct Translation
    description: Immediate translation operations
  - name: LLM Providers
    description: LLM provider management and testing
  - name: Results
    description: Translation result management and feedback
  - name: Analytics
    description: Usage analytics and quality metrics

