# ============================================================================
# EXTERNAL DOCS
# ============================================================================
externalDocs:
  description: |
    Imagineer Collaboration Hub Service Documentation
    
    ## WebSocket Protocol Documentation
    
    ### Connection
    ```javascript
    const ws = new WebSocket('wss://api.imagineer.dev/v1/collaboration/ws?token=JWT_TOKEN');
    ```
    
    ### Message Format
    All WebSocket messages follow this format:
    ```json
    {
      "type": "message_type",
      "workspace_id": "uuid",
      "data": {},
      "timestamp": "2024-01-01T12:00:00Z"
    }
    ```
    
    ### Supported Message Types
    - `presence_update` - User presence changes
    - `cursor_move` - Real-time cursor position
    - `comment_added` - New comment notifications
    - `comment_updated` - Comment modifications
    - `workspace_join` - User joined workspace
    - `workspace_leave` - User left workspace
    - `heartbeat` - Connection keepalive
    
    ### Error Handling
    WebSocket errors are sent as:
    ```json
    {
      "type": "error",
      "error": {
        "code": "error_code",
        "message": "Error description"
      }
    }
    ```
  url: https://docs.imagineer.dev/api/collaboration-hub