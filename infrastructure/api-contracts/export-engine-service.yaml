  - name: Export Templates
    description: Export template management
  - name: Export Artifacts
    description: Generated export file management
  - name: Storage
    description: Storage management and cleanup
  - name: Formats
    description: Export format support and validation
  - name: Webhooks
    description: Export completion webhook management

