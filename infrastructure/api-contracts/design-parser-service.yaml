tags:
  - name: Health
    description: Service health and status endpoints
  - name: Projects
    description: Design project management
  - name: Design Files
    description: Design file upload and management
  - name: Parsed Designs
    description: Parsed design data and analysis
  - name: Design Elements
    description: Individual design elements and components
  - name: Figma Integration
    description: Figma-specific integration endpoints
  - name: Jobs
    description: Background job management and monitoring

