openapi: 3.0.3
info:
  title: Imagineer Design Parser Service API
  description: |
    The Design Parser Service handles the ingestion, parsing, and analysis of design files 
    from various design tools (Figma, Adobe XD, Sketch, etc.). It extracts visual elements, 
    layout structures, and component hierarchies to prepare for LLM translation.
    
    ## Key Capabilities
    - Multi-format design file parsing (Figma API, uploaded files)
    - Visual element extraction and categorization
    - Layout analysis and component detection
    - Project and file management
    - Real-time sync with external design tools
    
    ## Authentication
    All endpoints require organization-level authentication via API key or JWT token.
    Multi-tenant access is enforced at the organization level.
  version: "1.0.0"
  contact:
    name: Imagineer API Support
    url: https://docs.imagineer.dev
    email: api-support@imagineer.dev
  license:
    name: Proprietary
    url: https://imagineer.dev/license

servers:
  - url: https://api.imagineer.dev/v1/parser
    description: Production API
  - url: https://staging-api.imagineer.dev/v1/parser
    description: Staging API
  - url: http://localhost:8001/v1
    description: Local Development

security:
  - apiKey: []
  - bearerAuth: []

paths:
  # ============================================================================
  # HEALTH & STATUS
  # ============================================================================
  /health:
    get:
      summary: Health check endpoint
      description: Returns service health status and version information
      tags: [Health]
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /status:
    get:
      summary: Detailed service status
      description: Returns detailed service status including dependencies
      tags: [Health]
      security: []
      responses:
        '200':
          description: Detailed service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'

  # ============================================================================
  # PROJECTS MANAGEMENT
  # ============================================================================
  /projects:
    get:
      summary: List projects
      description: Retrieve paginated list of design projects for the organization
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
        - name: team_id
          in: query
          description: Filter by team ID
          schema:
            type: string
            format: uuid
        - name: source_tool
          in: query
          description: Filter by source design tool
          schema:
            $ref: '#/components/schemas/DesignTool'
        - name: status
          in: query
          description: Filter by project status
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: search
          in: query
          description: Search in project names and descriptions
          schema:
            type: string
            maxLength: 100
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    post:
      summary: Create project
      description: Create a new design project
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    
    get:
      summary: Get project details
      description: Retrieve detailed information about a specific project
      tags: [Projects]
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      summary: Update project
      description: Update project information and settings
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      summary: Delete project
      description: Soft delete a project and all associated files
      tags: [Projects]
      responses:
        '204':
          description: Project deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /projects/{projectId}/sync:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    
    post:
      summary: Sync project with external source
      description: Trigger synchronization with external design tool (Figma, etc.)
      tags: [Projects]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: Force sync even if no changes detected
                  default: false
      responses:
        '202':
          description: Sync job initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================================================================
  # DESIGN FILES MANAGEMENT
  # ============================================================================
  /projects/{projectId}/files:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    
    get:
      summary: List design files
      description: Retrieve list of design files within a project
      tags: [Design Files]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: file_type
          in: query
          description: Filter by file type
          schema:
            type: string
        - name: processing_status
          in: query
          description: Filter by processing status
          schema:
            $ref: '#/components/schemas/ProcessingStatus'
      responses:
        '200':
          description: List of design files
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DesignFile'

    post:
      summary: Upload design file
      description: Upload a new design file to the project
      tags: [Design Files]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadFileRequest'
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignFile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'

  /projects/{projectId}/files/{fileId}:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
      - $ref: '#/components/parameters/FileIdParam'
    
    get:
      summary: Get design file details
      description: Retrieve detailed information about a design file
      tags: [Design Files]
      responses:
        '200':
          description: Design file details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignFileDetail'

    delete:
      summary: Delete design file
      description: Delete a design file and all associated data
      tags: [Design Files]
      responses:
        '204':
          description: File deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/files/{fileId}/process:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
      - $ref: '#/components/parameters/FileIdParam'
    
    post:
      summary: Process design file
      description: Trigger processing/parsing of a design file
      tags: [Design Files]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessFileRequest'
      responses:
        '202':
          description: Processing job initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJobResponse'

  # ============================================================================
  # PARSED DESIGNS & ELEMENTS
  # ============================================================================
  /projects/{projectId}/files/{fileId}/parsed:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
      - $ref: '#/components/parameters/FileIdParam'
    
    get:
      summary: Get parsed design data
      description: Retrieve the parsed and structured design data
      tags: [Parsed Designs]
      responses:
        '200':
          description: Parsed design data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParsedDesign'

  /projects/{projectId}/files/{fileId}/elements:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
      - $ref: '#/components/parameters/FileIdParam'
    
    get:
      summary: Get design elements
      description: Retrieve extracted design elements with filtering options
      tags: [Design Elements]
      parameters:
        - name: element_type
          in: query
          description: Filter by element type
          schema:
            $ref: '#/components/schemas/ElementType'
        - name: layer_name
          in: query
          description: Filter by layer name pattern
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: List of design elements
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DesignElement'

  # ============================================================================
  # FIGMA INTEGRATION
  # ============================================================================
  /figma/files:
    post:
      summary: Import Figma file
      description: Import a design file directly from Figma using file key
      tags: [Figma Integration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportFigmaRequest'
      responses:
        '202':
          description: Import job initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobResponse'

  /figma/webhook:
    post:
      summary: Figma webhook handler
      description: Handle webhooks from Figma for file change notifications
      tags: [Figma Integration]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigmaWebhookPayload'
      responses:
        '200':
          description: Webhook processed successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  # ============================================================================
  # JOBS & BACKGROUND PROCESSING
  # ============================================================================
  /jobs:
    get:
      summary: List processing jobs
      description: Retrieve list of background processing jobs
      tags: [Jobs]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: job_type
          in: query
          description: Filter by job type
          schema:
            $ref: '#/components/schemas/JobType'
        - name: status
          in: query
          description: Filter by job status
          schema:
            $ref: '#/components/schemas/JobStatus'
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Job'

  /jobs/{jobId}:
    parameters:
      - $ref: '#/components/parameters/JobIdParam'
    
    get:
      summary: Get job details
      description: Retrieve detailed information about a processing job
      tags: [Jobs]
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'

    delete:
      summary: Cancel job
      description: Cancel a pending or running job
      tags: [Jobs]
      responses:
        '204':
          description: Job cancelled successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

# ============================================================================
# COMPONENTS
# ============================================================================
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Organization API key for authentication
    
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for user authentication

  parameters:
    ProjectIdParam:
      name: projectId
      in: path
      required: true
      description: Unique project identifier
      schema:
        type: string
        format: uuid
    
    FileIdParam:
      name: fileId
      in: path
      required: true
      description: Unique file identifier
      schema:
        type: string
        format: uuid
    
    JobIdParam:
      name: jobId
      in: path
      required: true
      description: Unique job identifier
      schema:
        type: string
        format: uuid
    
    PageParam:
      name: page
      in: query
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
    
    LimitParam:
      name: limit
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    
    SortParam:
      name: sort
      in: query
      description: Sort order (field:direction)
      schema:
        type: string
        pattern: '^[a-zA-Z_][a-zA-Z0-9_]*:(asc|desc)$'
        default: 'created_at:desc'

  schemas:
    # ========================================================================
    # CORE DATA MODELS
    # ========================================================================
    Project:
      type: object
      required: [id, name, slug, organization_id, source_tool, status, created_at, created_by]
      properties:
        id:
          type: string
          format: uuid
          description: Unique project identifier
        organization_id:
          type: string
          format: uuid
          description: Organization that owns this project
        team_id:
          type: string
          format: uuid
          nullable: true
          description: Team associated with this project
        name:
          type: string
          maxLength: 255
          description: Project display name
        slug:
          type: string
          maxLength: 255
          pattern: '^[a-z0-9-]+$'
          description: URL-safe project identifier
        description:
          type: string
          nullable: true
          description: Project description
        source_tool:
          $ref: '#/components/schemas/DesignTool'
        source_url:
          type: string
          format: uri
          nullable: true
          description: External source URL (Figma file, etc.)
        source_file_id:
          type: string
          nullable: true
          description: External file identifier
        settings:
          type: object
          description: Project-specific settings
        auto_sync:
          type: boolean
          default: true
          description: Whether to automatically sync with external source
        sync_frequency_minutes:
          type: integer
          minimum: 5
          maximum: 10080
          default: 60
          description: Auto-sync frequency in minutes
        last_sync_at:
          type: string
          format: date-time
          nullable: true
          description: Last successful sync timestamp
        next_sync_at:
          type: string
          format: date-time
          nullable: true
          description: Next scheduled sync timestamp
        thumbnail_url:
          type: string
          format: uri
          nullable: true
          description: Project thumbnail image URL
        tags:
          type: array
          items:
            type: string
          description: Project tags
        category:
          type: string
          maxLength: 100
          nullable: true
          description: Project category
        visibility:
          type: string
          enum: [private, team, organization]
          default: team
          description: Project visibility level
        view_count:
          type: integer
          minimum: 0
          description: Number of times project has been viewed
        translation_count:
          type: integer
          minimum: 0
          description: Number of translations performed
        export_count:
          type: integer
          minimum: 0
          description: Number of exports performed
        status:
          $ref: '#/components/schemas/ProjectStatus'
        created_at:
          type: string
          format: date-time
          description: Project creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        created_by:
          type: string
          format: uuid
          description: User who created the project

    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            files_count:
              type: integer
              description: Number of design files in project
            latest_files:
              type: array
              items:
                $ref: '#/components/schemas/DesignFile'
              description: Most recently added files
            collaborators:
              type: array
              items:
                $ref: '#/components/schemas/ProjectCollaborator'
              description: Project collaborators
            sync_history:
              type: array
              items:
                $ref: '#/components/schemas/SyncEvent'
              description: Recent sync events

    DesignFile:
      type: object
      required: [id, project_id, name, file_type, processing_status, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique file identifier
        project_id:
          type: string
          format: uuid
          description: Parent project identifier
        name:
          type: string
          maxLength: 255
          description: File display name
        original_filename:
          type: string
          maxLength: 500
          nullable: true
          description: Original uploaded filename
        file_type:
          type: string
          maxLength: 50
          description: File type/format
        file_size_bytes:
          type: integer
          minimum: 0
          nullable: true
          description: File size in bytes
        file_hash:
          type: string
          maxLength: 64
          nullable: true
          description: SHA256 hash for deduplication
        storage_path:
          type: string
          maxLength: 1000
          nullable: true
          description: Storage path/URL
        external_id:
          type: string
          maxLength: 255
          nullable: true
          description: External file/page identifier
        external_url:
          type: string
          format: uri
          nullable: true
          description: External file URL
        external_last_modified:
          type: string
          format: date-time
          nullable: true
          description: External file last modified timestamp
        processing_status:
          $ref: '#/components/schemas/ProcessingStatus'
        processing_started_at:
          type: string
          format: date-time
          nullable: true
          description: Processing start timestamp
        processing_completed_at:
          type: string
          format: date-time
          nullable: true
          description: Processing completion timestamp
        processing_error:
          type: string
          nullable: true
          description: Processing error message
        processing_metadata:
          type: object
          description: Processing-specific metadata
        metadata:
          type: object
          description: File metadata
        created_at:
          type: string
          format: date-time
          description: File creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        uploaded_by:
          type: string
          format: uuid
          nullable: true
          description: User who uploaded the file

    DesignFileDetail:
      allOf:
        - $ref: '#/components/schemas/DesignFile'
        - type: object
          properties:
            versions:
              type: array
              items:
                $ref: '#/components/schemas/DesignVersion'
              description: File version history
            parsed_data:
              $ref: '#/components/schemas/ParsedDesign'
            elements_count:
              type: integer
              description: Number of extracted design elements
            processing_logs:
              type: array
              items:
                $ref: '#/components/schemas/ProcessingLog'
              description: Processing log entries

    ParsedDesign:
      type: object
      properties:
        id:
          type: string
          format: uuid
        design_file_id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
        canvas_data:
          type: object
          description: Raw canvas/artboard data
        layout_structure:
          type: object
          description: Hierarchical layout structure
        component_tree:
          type: object
          description: Component hierarchy tree
        style_tokens:
          type: object
          description: Extracted design tokens (colors, typography, spacing)
        design_system:
          type: object
          description: Detected design system patterns
        metadata:
          type: object
        processing_metadata:
          type: object
        created_at:
          type: string
          format: date-time

    DesignElement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parsed_design_id:
          type: string
          format: uuid
        element_type:
          $ref: '#/components/schemas/ElementType'
        name:
          type: string
        layer_name:
          type: string
        parent_element_id:
          type: string
          format: uuid
          nullable: true
        position:
          $ref: '#/components/schemas/Position'
        dimensions:
          $ref: '#/components/schemas/Dimensions'
        styles:
          type: object
          description: Element styling properties
        properties:
          type: object
          description: Element-specific properties
        content:
          type: string
          nullable: true
          description: Text content (for text elements)
        children_count:
          type: integer
          minimum: 0
        metadata:
          type: object

    # ========================================================================
    # REQUEST/RESPONSE MODELS
    # ========================================================================
    CreateProjectRequest:
      type: object
      required: [name, source_tool]
      properties:
        name:
          type: string
          maxLength: 255
          description: Project display name
        description:
          type: string
          nullable: true
          description: Project description
        team_id:
          type: string
          format: uuid
          nullable: true
          description: Team to associate with project
        source_tool:
          $ref: '#/components/schemas/DesignTool'
        source_url:
          type: string
          format: uri
          nullable: true
          description: External source URL
        source_file_id:
          type: string
          nullable: true
          description: External file identifier
        settings:
          type: object
          description: Project settings
        auto_sync:
          type: boolean
          default: true
        sync_frequency_minutes:
          type: integer
          minimum: 5
          maximum: 10080
          default: 60
        tags:
          type: array
          items:
            type: string
          maxItems: 20
        category:
          type: string
          maxLength: 100
          nullable: true
        visibility:
          type: string
          enum: [private, team, organization]
          default: team

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        team_id:
          type: string
          format: uuid
          nullable: true
        source_url:
          type: string
          format: uri
          nullable: true
        source_file_id:
          type: string
          nullable: true
        settings:
          type: object
        auto_sync:
          type: boolean
        sync_frequency_minutes:
          type: integer
          minimum: 5
          maximum: 10080
        tags:
          type: array
          items:
            type: string
          maxItems: 20
        category:
          type: string
          maxLength: 100
          nullable: true
        visibility:
          type: string
          enum: [private, team, organization]

    UploadFileRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: Design file to upload
        name:
          type: string
          maxLength: 255
          description: Custom file name (optional)
        metadata:
          type: object
          description: Additional file metadata
        auto_process:
          type: boolean
          default: true
          description: Whether to automatically start processing after upload

    ProcessFileRequest:
      type: object
      properties:
        force_reprocess:
          type: boolean
          default: false
          description: Force reprocessing even if already processed
        processing_options:
          type: object
          description: Custom processing options
        priority:
          type: integer
          minimum: 0
          maximum: 10
          default: 5
          description: Processing priority (0=low, 10=high)

    ImportFigmaRequest:
      type: object
      required: [figma_file_key, project_id]
      properties:
        figma_file_key:
          type: string
          description: Figma file key from URL
        project_id:
          type: string
          format: uuid
          description: Target project for import
        access_token:
          type: string
          description: Figma personal access token (if not configured globally)
        pages:
          type: array
          items:
            type: string
          description: Specific pages to import (empty = all pages)
        auto_sync:
          type: boolean
          default: true
          description: Enable automatic synchronization

    FigmaWebhookPayload:
      type: object
      required: [event_type, file_key, timestamp]
      properties:
        event_type:
          type: string
          enum: [FILE_UPDATE, FILE_DELETE, FILE_COMMENT]
        file_key:
          type: string
        timestamp:
          type: string
          format: date-time
        user_id:
          type: string
          nullable: true
        webhook_id:
          type: string

    # ========================================================================
    # RESPONSE MODELS
    # ========================================================================
    SyncJobResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing]
        estimated_duration_seconds:
          type: integer
          nullable: true
        status_url:
          type: string
          format: uri

    ProcessingJobResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing]
        estimated_duration_seconds:
          type: integer
          nullable: true
        status_url:
          type: string
          format: uri

    ImportJobResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing]
        project_id:
          type: string
          format: uuid
        status_url:
          type: string
          format: uri

    Job:
      type: object
      properties:
        id:
          type: string
          format: uuid
        job_type:
          $ref: '#/components/schemas/JobType'
        status:
          $ref: '#/components/schemas/JobStatus'
        progress_percentage:
          type: integer
          minimum: 0
          maximum: 100
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
          nullable: true
        metadata:
          type: object

    JobDetail:
      allOf:
        - $ref: '#/components/schemas/Job'
        - type: object
          properties:
            input_data:
              type: object
            output_data:
              type: object
            processing_logs:
              type: array
              items:
                $ref: '#/components/schemas/ProcessingLog'

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        version:
          type: string
        timestamp:
          type: string
          format: date-time
        uptime_seconds:
          type: integer

    ServiceStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        timestamp:
          type: string
          format: date-time
        dependencies:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
                enum: [healthy, unhealthy]
              response_time_ms:
                type: number
              last_check:
                type: string
                format: date-time
        metrics:
          type: object
          properties:
            requests_per_second:
              type: number
            active_jobs:
              type: integer
            queue_depth:
              type: integer
            memory_usage_mb:
              type: number
            cpu_usage_percent:
              type: number

    # ========================================================================
    # UTILITY MODELS
    # ========================================================================
    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          description: Array of data items
        pagination:
          type: object
          properties:
            page:
              type: integer
              minimum: 1
            limit:
              type: integer
              minimum: 1
            total:
              type: integer
              minimum: 0
            pages:
              type: integer
              minimum: 0
            has_next:
              type: boolean
            has_prev:
              type: boolean

    Position:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
        z:
          type: number
          default: 0

    Dimensions:
      type: object
      properties:
        width:
          type: number
          minimum: 0
        height:
          type: number
          minimum: 0

    # ========================================================================
    # ENUMS
    # ========================================================================
    DesignTool:
      type: string
      enum: [figma, sketch, adobe_xd, photoshop, illustrator, invision, marvel, principle, framer, other]
      description: Supported design tools

    ProjectStatus:
      type: string
      enum: [active, archived, deleted]
      description: Project status

    ProcessingStatus:
      type: string
      enum: [pending, processing, completed, failed, skipped]
      description: File processing status

    ElementType:
      type: string
      enum: [frame, group, text, image, vector, component, instance, slice, line, rectangle, ellipse, polygon, star, boolean_operation]
      description: Design element types

    JobType:
      type: string
      enum: [file_upload, file_processing, figma_import, project_sync, element_extraction]
      description: Background job types

    JobStatus:
      type: string
      enum: [queued, processing, completed, failed, cancelled, timeout]
      description: Job execution status

    # ========================================================================
    # SUPPORTING MODELS
    # ========================================================================
    ProjectCollaborator:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, admin, editor, viewer]
        permissions:
          type: array
          items:
            type: string
        added_at:
          type: string
          format: date-time

    SyncEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sync_type:
          type: string
          enum: [manual, automatic, webhook]
        status:
          type: string
          enum: [success, failed, partial]
        changes_detected:
          type: integer
        files_updated:
          type: integer
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error_message:
          type: string
          nullable: true

    DesignVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version_number:
          type: integer
        file_hash:
          type: string
        changes_summary:
          type: string
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          nullable: true

    ProcessingLog:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [debug, info, warning, error]
        message:
          type: string
        metadata:
          type: object

    # ========================================================================
    # ERROR MODELS
    # ========================================================================
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Error code for programmatic handling
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              description: Additional error details
            request_id:
              type: string
              description: Request ID for tracking

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              type: object
              properties:
                validation_errors:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      message:
                        type: string
                      value:
                        description: The invalid value

  responses:
    BadRequest:
      description: Bad request - invalid input parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Conflict - resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    PayloadTooLarge:
      description: File too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Request limit per time window
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Remaining requests in current window
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Time when rate limit resets (Unix timestamp)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

