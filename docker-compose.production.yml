# Docker Compose for Imagineer Platform - PRODUCTION CONFIGURATION
# This configuration is optimized for production deployment with:
# - Security hardening
# - Performance optimization
# - High availability
# - Comprehensive monitoring

version: '3.8'

services:
  # ============================================================================
  # INFRASTRUCTURE SERVICES - PRODUCTION OPTIMIZED
  # ============================================================================
  
  # PostgreSQL Primary Database with Production Settings
  postgres:
    image: postgres:15-alpine
    container_name: imagineer-postgres-prod
    environment:
      POSTGRES_DB: imagineer
      POSTGRES_USER: imagineer_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      # Production PostgreSQL Configuration
      POSTGRES_INITDB_ARGS: "--data-checksums --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./infrastructure/production/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    ports:
      - "127.0.0.1:5433:5432"  # Bind to localhost only
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagineer_user -d imagineer"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Redis with Persistence and Production Settings
  redis:
    image: redis:7-alpine
    container_name: imagineer-redis-prod
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 0
    volumes:
      - redis_data:/data
      - ./infrastructure/production/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:6380:6379"  # Bind to localhost only
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.2'
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Vector Database (Weaviate) Production Configuration
  weaviate:
    image: semitechnologies/weaviate:1.22.4
    container_name: imagineer-weaviate-prod
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'false'
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY}
      AUTHENTICATION_APIKEY_USERS: admin
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
      ENABLE_MODULES: 'text2vec-openai,text2vec-cohere,text2vec-huggingface,ref2vec-centroid'
      LOG_LEVEL: 'info'
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.3'

  # ============================================================================
  # MICROSERVICES - PRODUCTION BUILDS
  # ============================================================================

  # Design Parser Service - Production
  design-parser:
    build: 
      context: ./services/design-parser
      dockerfile: Dockerfile.production
      target: production
    container_name: imagineer-design-parser-prod
    environment:
      NODE_ENV: production
      PORT: 8001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: imagineer
      DB_USER: imagineer_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FIGMA_ACCESS_TOKEN: ${FIGMA_ACCESS_TOKEN}
      LOG_LEVEL: warn
      # Production optimizations
      NODE_OPTIONS: "--max-old-space-size=1024"
      UV_THREADPOOL_SIZE: 128
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.3'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Translation Engine Service - Production
  translation-engine:
    build:
      context: ./services/translation-engine
      dockerfile: Dockerfile.production
      target: production
    container_name: imagineer-translation-engine-prod
    environment:
      NODE_ENV: production
      PORT: 8002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: imagineer
      DB_USER: imagineer_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      LOG_LEVEL: warn
      # Production optimizations
      NODE_OPTIONS: "--max-old-space-size=2048"
      UV_THREADPOOL_SIZE: 128
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 2.5G
          cpus: '1.5'
        reservations:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Export Engine Service - Production
  export-engine:
    build:
      context: ./services/export-engine
      dockerfile: Dockerfile.production
      target: production
    container_name: imagineer-export-engine-prod
    environment:
      NODE_ENV: production
      PORT: 8003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: imagineer
      DB_USER: imagineer_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      LOG_LEVEL: warn
      # Production optimizations
      NODE_OPTIONS: "--max-old-space-size=1024"
      UV_THREADPOOL_SIZE: 128
    ports:
      - "127.0.0.1:8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.3'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Collaboration Hub Service - Production
  collaboration-hub:
    build:
      context: ./services/collaboration-hub
      dockerfile: Dockerfile.production
      target: production
    container_name: imagineer-collaboration-hub-prod
    environment:
      NODE_ENV: production
      PORT: 8004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: imagineer
      DB_USER: imagineer_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: warn
      # Production optimizations
      NODE_OPTIONS: "--max-old-space-size=1024"
      UV_THREADPOOL_SIZE: 128
    ports:
      - "127.0.0.1:8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.3'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # API GATEWAY & LOAD BALANCER - PRODUCTION
  # ============================================================================

  # Kong API Gateway with Production Security
  kong:
    image: kong:3.4
    container_name: imagineer-kong-prod
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong-production.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_SSL_CERT: /etc/ssl/certs/imagineer.crt
      KONG_SSL_CERT_KEY: /etc/ssl/private/imagineer.key
      KONG_NGINX_WORKER_PROCESSES: auto
      KONG_NGINX_HTTP_CLIENT_MAX_BODY_SIZE: 10m
    volumes:
      - ./infrastructure/api-gateway/kong-production.yml:/kong/kong-production.yml:ro
      - ./infrastructure/ssl:/etc/ssl:ro
    ports:
      - "80:8000"   # HTTP
      - "443:8443"  # HTTPS
      - "127.0.0.1:8091:8001"  # Admin API (localhost only)
    depends_on:
      - design-parser
      - translation-engine
      - export-engine
      - collaboration-hub
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.2'
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # MONITORING & OBSERVABILITY - PRODUCTION
  # ============================================================================

  # Prometheus with Production Configuration
  prometheus:
    image: prom/prometheus:latest
    container_name: imagineer-prometheus-prod
    command:
      - '--config.file=/etc/prometheus/prometheus-production.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=20GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus-production.yml:/etc/prometheus/prometheus-production.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.2'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana with Production Security
  grafana:
    image: grafana/grafana:latest
    container_name: imagineer-grafana-prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      GF_SECURITY_DISABLE_GRAVATAR: true
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_ANALYTICS_CHECK_FOR_UPDATES: false
      GF_SECURITY_COOKIE_SECURE: true
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 256M
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Jaeger for Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: imagineer-jaeger-prod
    environment:
      COLLECTOR_OTLP_ENABLED: true
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: 50000
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
      - "127.0.0.1:14268:14268"  # Jaeger collector
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 256M
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # REVERSE PROXY & CDN - PRODUCTION
  # ============================================================================

  # Nginx with Production Security Headers
  nginx:
    image: nginx:alpine
    container_name: imagineer-nginx-prod
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./infrastructure/nginx/nginx-production.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/ssl:/etc/ssl:ro
      - ./infrastructure/nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - kong
    networks:
      - imagineer-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================================
# VOLUMES - PRODUCTION WITH BACKUP LABELS
# ============================================================================

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/imagineer/postgres
    labels:
      backup: "true"
      retention: "30d"
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/imagineer/redis
    labels:
      backup: "true"
      retention: "7d"
  weaviate_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/imagineer/weaviate
    labels:
      backup: "true"
      retention: "30d"
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/imagineer/prometheus
    labels:
      backup: "true"
      retention: "90d"
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/imagineer/grafana
    labels:
      backup: "false"
      retention: "30d"

# ============================================================================
# NETWORKS - PRODUCTION WITH ISOLATION
# ============================================================================

networks:
  imagineer-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: imagineer-prod
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/16
    labels:
      environment: "production"
      project: "imagineer"